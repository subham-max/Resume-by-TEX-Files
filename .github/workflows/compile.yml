name: Compile LaTeX Resume

permissions:
  contents: write

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the code from your repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Compile LaTeX to PDF using Docker container
      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex

      # 3. Save the compiled PDF as a downloadable Artifact
      - name: Upload PDF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Resume-PDF
          path: resume.pdf
      - name: Commit PDF back to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Auto-compile PDF [skip ci]"
          file_pattern: "resume.pdf"